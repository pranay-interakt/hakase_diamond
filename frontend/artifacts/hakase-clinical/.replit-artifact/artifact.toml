kind = "web"
previewPath = "/"
title = "Hakase Clinical AI"
version = "1.0.0"
id = "artifacts/hakase-clinical"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20817
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hakase-clinical run dev"

[services.env]
PORT = "20817"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hakase-clinical", "run", "build"]
publicDir = "artifacts/hakase-clinical/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
